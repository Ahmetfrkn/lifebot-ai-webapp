<div class="chat-display" id="chat-display">
    <div class="chat-display-container" id="chat-display-container">
        {% for msg in mesajlar %}
            <div class="chat-bubble-container {% if msg.kim == 'user' %}user-msg{% else %}bot-msg{% endif %}">
                <div class="chat-bubble {% if msg.kim == 'user' %}user{% else %}bot{% endif %}">
                    {{ msg.mesaj }}
                    <span class="timestamp">
                        <i class="fa-regular fa-clock"></i> {{ msg.zaman }}
                    </span>
                </div>
            </div>
        {% else %}
            <div style="margin: 100px auto; text-align: center; color: var(--text-muted); font-size: 15px; padding: 20px;" class="empty-chat-placeholder">
                <i class="fa-solid fa-comments" style="font-size: 40px; color: var(--text-muted); opacity: 0.4; margin-bottom: 12px; display: block;"></i>
                Henüz mesaj yok. Sohbeti başlatmak için bir şeyler yazın!
            </div>
        {% endfor %}
        <div id="chat-bottom-anchor"></div>
    </div>
</div>
