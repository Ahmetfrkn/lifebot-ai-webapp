<div class="chat-input-area">
    <form id="chatForm" class="chat-input-form" data-sohbet-id="{{ secili_sohbet_id }}">
        <div class="chat-input-container">
            <textarea name="metin" placeholder="Bir şeyler yazın veya dertleşmeye başlayın..." rows="1"></textarea>
        </div>
        <button type="submit" class="send-message-btn" title="Gönder" disabled>
            <i class="fa-solid fa-arrow-up"></i>
        </button>
    </form>
</div>
